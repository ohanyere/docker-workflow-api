apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: docker-workflow-api-alerts
  labels:
    app.kubernetes.io/name: docker-workflow-api
    release: prometheus
spec:
  groups:
    - name: docker-workflow-api.availability
      rules:
        - alert: docker-workflow-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="docker-workflow-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="docker-workflow-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Platform Engineering
          annotations:
            summary: docker-workflow-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: docker-workflow-apiUnavailable
          expr: up{job="docker-workflow-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Platform Engineering
          annotations:
            summary: docker-workflow-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
